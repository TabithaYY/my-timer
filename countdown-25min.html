<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>25 分钟倒计时</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f7eded;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  user-select: none;
  cursor: pointer;
}
canvas { display: block; }
#title {
  margin-bottom: 4px;
  font-size: 22px;
  letter-spacing: 0.18em;
  color: #790c5a;
  font-weight: 500;
}
#subtitle {
  margin-top: 6px;
  margin-bottom: 16px;
  font-size: 22px;
  letter-spacing: 0.2em;
  color: #f35588;
}
#label {
  margin-top: 24px;
  font-size: 15px;
  letter-spacing: 0.12em;
  color: #f35588;
}
#hint {
  margin-top: 10px;
  font-size: 12px;
  color: #c9a0b8;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<div id="title">✦ 圆桌交流：妈妈喂养那些事 ✦</div>
<div id="subtitle">分组讨论</div>
<canvas id="c"></canvas>
<div id="label">专注倒计时</div>
<div id="hint">点击开始 / 暂停 &nbsp;·&nbsp; 双击重置</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const TOTAL = 25 * 60;

let remaining = TOTAL;
let pausedAt = TOTAL;
let startTime = null;
let rafId = null;
let running = false;
let finished = false;

function resize() {
  const size = Math.min(window.innerWidth, window.innerHeight) * 0.58;
  canvas.width = size;
  canvas.height = size;
  draw(remaining);
}

function draw(rem) {
  const W = canvas.width;
  const cx = W / 2, cy = W / 2;
  const R = W * 0.42;
  const progress = rem / TOTAL;

  ctx.clearRect(0, 0, W, W);

  // 装饰小花点
  const dots = 60;
  for (let i = 0; i < dots; i++) {
    const angle = (i / dots) * Math.PI * 2 - Math.PI / 2;
    const dr = R + W * 0.072;
    const dx = cx + Math.cos(angle) * dr;
    const dy = cy + Math.sin(angle) * dr;
    const dotR = i % 5 === 0 ? W * 0.012 : W * 0.005;
    ctx.beginPath();
    ctx.arc(dx, dy, dotR, 0, Math.PI * 2);
    ctx.fillStyle = i % 5 === 0 ? '#f35588' : '#e8b4c8';
    ctx.fill();
  }

  // 背景轨道
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = '#f0cede';
  ctx.lineWidth = W * 0.042;
  ctx.stroke();

  // 进度弧
  if (progress > 0) {
    const startAngle = -Math.PI / 2;
    const endAngle = startAngle + Math.PI * 2 * progress;
    ctx.beginPath();
    ctx.arc(cx, cy, R, startAngle, endAngle);
    ctx.strokeStyle = rem <= 60 ? '#790c5a' : '#f35588';
    ctx.lineWidth = W * 0.042;
    ctx.lineCap = 'round';
    ctx.stroke();

    // 进度点头
    ctx.beginPath();
    ctx.arc(
      cx + Math.cos(endAngle) * R,
      cy + Math.sin(endAngle) * R,
      W * 0.028, 0, Math.PI * 2
    );
    ctx.fillStyle = rem <= 60 ? '#790c5a' : '#f35588';
    ctx.fill();
  }

  // 内圆背景
  ctx.beginPath();
  ctx.arc(cx, cy, R - W * 0.06, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // 时间数字
  const mm = String(Math.floor(rem / 60)).padStart(2, '0');
  const ss = String(rem % 60).padStart(2, '0');

  ctx.font = '500 ' + Math.floor(W * 0.2) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = rem <= 60 ? '#790c5a' : '#790c5a';
  ctx.fillText(mm + ':' + ss, cx, cy - W * 0.04);

  // 状态文字
  ctx.font = '400 ' + Math.floor(W * 0.048) + 'px sans-serif';
  ctx.fillStyle = running ? '#f35588' : rem === 0 ? '#790c5a' : '#c9a0b8';
  const stateText = rem === 0 ? '时间到！' : running ? '进行中 ♡' : pausedAt === TOTAL ? '点击开始' : '已暂停';
  ctx.fillText(stateText, cx, cy + W * 0.13);
}

function loop(ts) {
  if (!startTime) startTime = ts;
  const elapsed = Math.floor((ts - startTime) / 1000);
  remaining = Math.max(pausedAt - elapsed, 0);
  draw(remaining);
  if (remaining > 0 && running) {
    rafId = requestAnimationFrame(loop);
  } else if (remaining === 0 && running) {
    running = false;
    finished = true;
    draw(0);
  }
}

function toggle() {
  if (finished) return;
  if (running) {
    running = false;
    cancelAnimationFrame(rafId);
    draw(remaining);
  } else {
    running = true;
    pausedAt = remaining;
    startTime = null;
    rafId = requestAnimationFrame(loop);
  }
}

function reset() {
  running = false;
  finished = false;
  cancelAnimationFrame(rafId);
  remaining = TOTAL;
  pausedAt = TOTAL;
  startTime = null;
  draw(remaining);
}

let lastClick = 0;
document.body.addEventListener('click', function() {
  const now = Date.now();
  if (now - lastClick < 300) {
    reset();
    lastClick = 0;
    return;
  }
  lastClick = now;
  setTimeout(function() {
    if (Date.now() - lastClick >= 280) toggle();
  }, 280);
});

window.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { e.preventDefault(); toggle(); }
  if (e.code === 'KeyR') reset();
  if (e.code === 'F11') {
    e.preventDefault();
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
